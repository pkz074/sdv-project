services:
  databroker:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:latest
    container_name: kuksa-databroker
    ports:
      - "55556:55555"
    environment:
      - KUKSA_DATA_BROKER_ADDR=0.0.0.0
    restart: always

  zenoh:
    image: eclipse/zenoh:1.0.0
    container_name: zenoh-router
    ports:
      - "7447:7447"
      - "8000:8000"
    volumes:
      - ./zenoh-config.json5:/zenoh-config.json5
    entrypoint: ["/zenohd"]
    command: ["--config", "/zenoh-config.json5"]
    restart: always
